version: "3.9"

services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 3s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data  # ephemeral — fast tests

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["sh", "-c", "pip install -e '.[dev]' && pytest -v --tb=short"]
    environment:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@test-db:5432/test_db
      JWT_SECRET_KEY: test-secret-key-for-ci-only
      APP_ENV: test
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
